<div class="search-card">
  <h2>TV Show Search</h2>
  <p class="subtitle">Three component-interaction patterns in one view</p>

  @if (isLoading()) {
    <mat-progress-bar mode="indeterminate" class="progress-bar" />
  }

  <div class="inputs-row">
    <!-- Pattern 1: ViewChild + fromEvent — reactive, debounced auto-search -->
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>ViewChild — auto search</mat-label>
      <input #movieSearchInput matInput placeholder="Type 3+ chars…" name="viewChildInput" />
      <mat-hint>Triggers search via fromEvent after 500ms debounce</mat-hint>
    </mat-form-field>

    <!-- Pattern 2: EventEmitter — parent emits to child via ViewChild -->
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>EventEmitter — manual search</mat-label>
      <input matInput [(ngModel)]="searchText" placeholder="Search shows…" name="eventEmitterInput" />
      <mat-hint>Button emits directly on child's EventEmitter</mat-hint>
    </mat-form-field>
  </div>

  <div class="buttons-row">
    <button
      mat-raised-button
      color="primary"
      (click)="searchByEventEmitter()"
      [disabled]="isLoading()"
    >
      Search (EventEmitter)
    </button>
    <button
      mat-raised-button
      color="accent"
      (click)="searchByBehaviorSubject()"
      [disabled]="isLoading()"
    >
      Search (BehaviorSubject)
    </button>
  </div>
</div>

<div class="table-container">
  <app-data-table
    #dataTableComponent
    [configOption]="configOption"
  />
</div>
